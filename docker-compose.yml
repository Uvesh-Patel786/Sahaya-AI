version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sahayak-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - sahayak-network
    restart: unless-stopped

  ai-service:
    image: python:3.11-slim
    container_name: sahayak-ai-service
    working_dir: /app
    command: >
      bash -c "pip install -r ai-service/requirements.txt &&
               python -m uvicorn ai-service.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app/ai-service
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - sahayak-network
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: sahayak-frontend
    working_dir: /app
    command: >
      bash -c "cd frontend &&
               npm install &&
               npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - sahayak-network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: sahayak-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sahayak
    volumes:
      - mongodb-data:/data/db
    networks:
      - sahayak-network
    restart: unless-stopped

networks:
  sahayak-network:
    driver: bridge

volumes:
  mongodb-data: