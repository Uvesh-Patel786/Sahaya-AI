services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/sahayak
      AI_SERVICE_URL: http://ai-service:8000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CHROMA_URL: http://chromadb:8000
      MONGODB_URI: mongodb://mongodb:27017/sahayak
    depends_on:
      - chromadb
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  chroma_data:
  uploads_data:
